<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Water Quest</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <h1><img src="img/cw_logo_horizontal.png" alt="charity: water logo">Water Quest</h1>
    <p class="game-instructions">Collect clean water cans, avoid dirty drops, and reach 20 points.</p>
    <div class="stats">
      <p>Score: <span id="current-cans">0</span></p>
      <p>Time Left: <span id="timer">30</span>s</p>
    </div>
    <div id="achievements" class="achievement"></div>
    <div class="game-grid"></div>
    <div class="controls">
      <button id="start-game">Start Game</button>
      <button id="reset-game">Reset</button>
    </div>
    <div id="celebration" aria-hidden="true"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
